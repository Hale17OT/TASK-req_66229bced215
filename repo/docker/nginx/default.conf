server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 64M;

    # Security headers (offline app, stay strict)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static Layui + frontend assets
    location ~* ^/static/.*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|map)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # Static HTML pages (Layui shell)
    location ~* ^/pages/.*\.html$ {
        try_files $uri =404;
    }

    # Block access to sensitive paths
    location ~* /\.(git|env|ht|docker|gitignore) { deny all; return 404; }
    location ~* /(app|config|route|extend|tests|seed|migrations|runtime|storage|vendor|scripts|docker)/ {
        deny all; return 404;
    }

    # Default — missing files go through the ThinkPHP front controller.
    # We rewrite into /index.php<uri> (no double slash) so PATH_INFO lines up.
    location / {
        if (!-e $request_filename) {
            rewrite ^/(.*)$ /index.php/$1 last;
        }
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 60s;
    }
}
