; Application overrides — loaded after php.ini-production
date.timezone = UTC
expose_php = Off

memory_limit = 256M
max_execution_time = 60
post_max_size = 64M
upload_max_filesize = 12M
max_file_uploads = 10

; Sessions managed by ThinkPHP, but keep PHP defaults safe
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
session.gc_maxlifetime = 1800

; Opcache
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; Hide errors from end users; logs go to stderr / runtime
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /proc/self/fd/2

; Argon2 tuning — modest defaults, safe under php-fpm load
; (raise memory_cost / time_cost if hardware allows)
; These are PHP defaults; password_hash() uses them.
